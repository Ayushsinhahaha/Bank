<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .nav-brand { font-size: 20px; font-weight: 700; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-user {
            font-size: 14px;
            opacity: 0.9;
        }

        .notif-btn {
            position: relative;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .notif-btn:hover { background: rgba(255,255,255,0.3); }

        .notif-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        /* NOTIFICATION PANEL */
        .notif-panel {
            position: fixed;
            top: 65px;
            right: 20px;
            width: 330px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            display: none;
            z-index: 999;
            overflow: hidden;
        }

        .notif-header {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-header h4 { color: #2c3e50; font-size: 15px; }

        .mark-read-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 12px;
            cursor: pointer;
        }

        .notif-list { max-height: 360px; overflow-y: auto; }

        .notif-item {
            padding: 12px 20px;
            border-bottom: 1px solid #fafafa;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .notif-item.unread { background: #f0f3ff; }

        .notif-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 25px auto;
            padding: 0 20px;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-top: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-3px); }
        .stat-card:nth-child(2) { border-top-color: #f39c12; }
        .stat-card:nth-child(3) { border-top-color: #3498db; }
        .stat-card:nth-child(4) { border-top-color: #27ae60; }

        .stat-icon { font-size: 28px; margin-bottom: 8px; }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #2c3e50;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* CARDS */
        .card {
            background: white;
            border-radius: 14px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 22px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header h3 {
            color: #2c3e50;
            font-size: 17px;
        }

        /* FORM */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #555;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #eee;
            border-radius: 9px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .btn-submit {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* TABLE */
        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            padding: 12px 15px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid #f5f5f5;
        }

        th {
            background: #f8f9ff;
            color: #667eea;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover { background: #fafcff; }

        /* BADGES */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-assigned { background: #cce5ff; color: #004085; }
        .badge-in_progress { background: #d4edda; color: #155724; }
        .badge-completed { background: #d1ecf1; color: #0c5460; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }

        .priority-high { color: #e74c3c; font-weight: 700; }
        .priority-medium { color: #f39c12; font-weight: 700; }
        .priority-low { color: #27ae60; font-weight: 700; }

        /* ALERT */
        .alert {
            padding: 12px 16px;
            border-radius: 9px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .alert-success {
            background: #eafaf1;
            color: #1e8449;
            border-left: 4px solid #27ae60;
        }

        .alert-error {
            background: #fdecea;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #2c3e50;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            max-width: 320px;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 40px;
            font-size: 14px;
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-brand">🛎️ ServicePortal</div>
    <div class="nav-right">
        <span class="nav-user" id="welcomeText">Welcome!</span>
        <button class="notif-btn" onclick="toggleNotifPanel()" title="Notifications">
            🔔
            <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notifPanel">
    <div class="notif-header">
        <h4>🔔 Notifications</h4>
        <button class="mark-read-btn" onclick="markAllRead()">
            Mark all read
        </button>
    </div>
    <div class="notif-list" id="notifList">
        <div class="notif-item">No notifications yet</div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Total Requests</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-number" id="statPending">0</div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔄</div>
            <div class="stat-number" id="statProgress">0</div>
            <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-number" id="statDone">0</div>
            <div class="stat-label">Completed</div>
        </div>
    </div>

    <!-- RAISE REQUEST FORM -->
    <div class="card">
        <div class="card-header">
            <h3>➕ Raise New Service Request</h3>
        </div>

        <div class="alert" id="formAlert"></div>

        <form id="requestForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Request Title *</label>
                    <input type="text" id="title"
                        placeholder="e.g. Need Medical Assistance" required />
                </div>
                <div class="form-group">
                    <label>Service Type *</label>
                    <select id="service_type" required>
                        <option value="">-- Select Service --</option>
                        <option>Medical Assistance</option>
                        <option>Home Care</option>
                        <option>Transportation</option>
                        <option>Grocery Shopping</option>
                        <option>Medication Reminder</option>
                        <option>Doctor Appointment</option>
                        <option>Companionship</option>
                        <option>Technical Help</option>
                        <option>Legal Assistance</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Priority Level</label>
                    <select id="priority">
                        <option value="low">🟢 Low Priority</option>
                        <option value="medium" selected>🟡 Medium Priority</option>
                        <option value="high">🔴 High Priority</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description *</label>
                <textarea id="description"
                    placeholder="Describe your request in detail..."
                    required></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                🚀 Submit Request
            </button>
        </form>
    </div>

    <!-- MY REQUESTS TABLE -->
    <div class="card">
        <div class="card-header">
            <h3>📂 My Service Requests</h3>
            <button class="btn-submit" 
                style="padding:8px 16px;font-size:13px"
                onclick="loadRequests()">
                🔄 Refresh
            </button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Service Type</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assigned Agent</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="requestsTable">
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <div>No requests yet. Raise your first request!</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    const API = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    // Auth check
    if (!token || user.role !== 'user') {
        window.location.href = '../index.html';
    }

    document.getElementById('welcomeText').textContent =
        `Hi, ${user.name}! 👋`;

    // ── SOCKET.IO ──────────────────────────────────────
    const socket = io('http://localhost:5000');
    socket.emit('join', user.id, 'user');

    socket.on('status_update', (data) => {
        showToast('🔔 ' + data.message);
        loadRequests();
        loadNotifications();
    });

    // ── LOAD REQUESTS ──────────────────────────────────
    async function loadRequests() {
        try {
            const res = await fetch(`${API}/requests/my-requests`, {
                headers: { Authorization: `Bearer ${token}` },
            });
            const data = await res.json();

            if (!data.success) return;

            const reqs = data.requests;

            // Stats
            document.getElementById('statTotal').textContent = reqs.length;
            document.getElementById('statPending').textContent =
                reqs.filter((r) => r.status === 'pending').length;
            document.getElementById('statProgress').textContent =
                reqs.filter((r) => r.status === 'in_progress').length;
            document.getElementById('statDone').textContent =
                reqs.filter((r) => r.status === 'completed').length;

            const tbody = document.getElementById('requestsTable');

            if (reqs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>No requests yet!</div>
                    </div></td></tr>`;
                return;
            }

            tbody.innerHTML = reqs.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>
                        <strong>${r.title}</strong>
                        <div style="font-size:12px;color:#999;margin-top:3px">
                            ${r.description.substring(0, 50)}...
                        </div>
                    </td>
                    <td>${r.service_type}</td>
                    <td class="priority-${r.priority}">
                        ${r.priority.toUpperCase()}
                    </td>
                    <td>
                        <span class="badge badge-${r.status}">
                            ${r.status.replace('_', ' ')}
                        </span>
                    </td>
                    <td>${r.assigned_agent
                        ? r.assigned_agent.full_name
                        : '<span style="color:#bbb">Not assigned</span>'
                    }</td>
                    <td>${new Date(r.createdAt).toLocaleDateString('en-IN', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    })}</td>
                </tr>
            `).join('');

        } catch (err) {
            console.error('Error loading requests:', err);
        }
    }

    // ── SUBMIT REQUEST ──────────────────────────────────
    document.getElementById('requestForm')
    .addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const body = {
            title: document.getElementById('title').value.trim(),
            service_type: document.getElementById('service_type').value,
            priority: document.getElementById('priority').value,
            description: document.getElementById('description').value.trim(),
        };

        try {
            const res = await fetch(`${API}/requests/raise`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify(body),
            });

            const data = await res.json();
            const alertEl = document.getElementById('formAlert');

            if (data.success) {
                alertEl.textContent =
                    '✅ Request submitted successfully! Agents have been notified.';
                alertEl.className = 'alert alert-success';
                alertEl.style.display = 'block';
                document.getElementById('requestForm').reset();
                loadRequests();
                setTimeout(() => (alertEl.style.display = 'none'), 4000);
            } else {
                alertEl.textContent = '❌ ' + data.message;
                alertEl.className = 'alert alert-error';
                alertEl.style.display = 'block';
            }
        } catch (err) {
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.textContent = '🚀 Submit Request';
        }
    });

    // ── NOTIFICATIONS ───────────────────────────────────
    async function loadNotifications() {
        try {
            const res = await fetch(`${API}/requests/notifications`, {
                headers: { Authorization: `Bearer ${token}` },
            });
            const data = await res.json();

            if (!data.success) return;

            const badge = document.getElementById('notifBadge');
            if (data.unreadCount > 0) {
                badge.textContent = data.unreadCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }

            const list = document.getElementById('notifList');
            if (data.notifications.length === 0) {
                list.innerHTML =
                    '<div class="notif-item">No notifications yet</div>';
                return;
            }

            list.innerHTML = data.notifications.map((n) => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}">
                    ${n.message}
                    <div class="notif-time">
                        ${new Date(n.createdAt).toLocaleString('en-IN')}
                    </div>
                </div>
            `).join('');

        } catch (err) {
            console.error(err);
        }
    }

    async function markAllRead() {
        try {
            await fetch(`${API}/requests/notifications/read-all`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${token}` },
            });
            loadNotifications();
        } catch (err) {
            console.error(err);
        }
    }

    function toggleNotifPanel() {
        const panel = document.getElementById('notifPanel');
        panel.style.display =
            panel.style.display === 'block' ? 'none' : 'block';
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => (toast.style.display = 'none'), 5000);
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../index.html';
    }

    // Close notif panel on outside click
    document.addEventListener('click', (e) => {
        const panel = document.getElementById('notifPanel');
        if (!panel.contains(e.target) &&
            !e.target.closest('.notif-btn')) {
            panel.style.display = 'none';
        }
    });

    // ── INIT ────────────────────────────────────────────
    loadRequests();
    loadNotifications();
    setInterval(loadNotifications, 30000);
</script>
</body>
</html>
